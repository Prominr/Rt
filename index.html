<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Portal</title>
  <link rel="icon" href="https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #050810;
      --bg-soft: #0b1324;
      --panel: rgba(14, 22, 39, 0.92);
      --panel-strong: rgba(14, 22, 39, 0.98);
      --line: rgba(255, 255, 255, 0.09);
      --text: #e8eef8;
      --muted: #8f9bb6;
      --brand: #57b9ff;
      --brand-soft: rgba(87, 185, 255, 0.2);
      --danger: #ff7f7f;
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1100px 520px at 5% -10%, #1e3158 0%, transparent 60%),
        radial-gradient(1000px 520px at 95% -10%, #0e284d 0%, transparent 60%),
        linear-gradient(180deg, #050810 0%, #080f1d 100%);
      padding: 18px;
    }

    .app-shell {
      width: min(1240px, 100%);
      min-height: calc(100vh - 36px);
      margin: 0 auto;
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(14, 22, 39, 0.9), rgba(8, 13, 24, 0.95));
      box-shadow: 0 20px 68px rgba(0, 0, 0, 0.45);
      display: grid;
      grid-template-rows: auto auto 1fr;
      position: relative;
      isolation: isolate;
    }

    .toolbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding: 12px;
      background: linear-gradient(180deg, rgba(10, 16, 28, 0.96), rgba(10, 16, 28, 0.75));
    }

    .brand {
      border-radius: 12px;
      border: 1px solid rgba(87, 185, 255, 0.4);
      background: var(--brand-soft);
      padding: 9px 12px;
      min-width: 132px;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #d8ecff;
      user-select: none;
    }

    .url-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto auto auto auto;
      gap: 8px;
      align-items: center;
    }

    input,
    button {
      font: inherit;
      color: inherit;
    }

    #url-input {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(8, 13, 24, 0.95);
      padding: 10px 13px;
      width: 100%;
      outline: none;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }

    #url-input:focus {
      border-color: rgba(87, 185, 255, 0.82);
      box-shadow: 0 0 0 3px rgba(87, 185, 255, 0.2);
    }

    .btn {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(15, 23, 40, 0.92);
      padding: 9px 11px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 120ms ease, border-color 120ms ease, transform 120ms ease;
    }

    .btn:hover {
      border-color: rgba(87, 185, 255, 0.65);
      background: rgba(23, 35, 60, 0.95);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-primary {
      border-color: rgba(87, 185, 255, 0.6);
      background: linear-gradient(180deg, rgba(56, 149, 225, 0.42), rgba(37, 107, 166, 0.5));
    }

    .btn-danger {
      border-color: rgba(255, 127, 127, 0.56);
      background: rgba(145, 35, 46, 0.35);
    }

    .right-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .status {
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(8, 13, 24, 0.95);
      color: var(--muted);
      font-size: 0.82rem;
      padding: 6px 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .status::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #8f9bb6;
      box-shadow: 0 0 0 3px rgba(143, 155, 182, 0.2);
    }

    .status[data-state="online"]::before {
      background: #58de97;
      box-shadow: 0 0 0 3px rgba(88, 222, 151, 0.22);
    }

    .status[data-state="offline"]::before {
      background: var(--danger);
      box-shadow: 0 0 0 3px rgba(255, 127, 127, 0.22);
    }

    .tab-strip {
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: thin;
      border-bottom: 1px solid var(--line);
      background: rgba(7, 11, 20, 0.95);
      padding: 9px 12px;
    }

    .tab-chip {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(13, 21, 36, 0.95);
      color: #bcc8df;
      min-width: 120px;
      max-width: 250px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      cursor: pointer;
      user-select: none;
      transition: background 120ms ease, border-color 120ms ease;
    }

    .tab-chip.active {
      border-color: rgba(87, 185, 255, 0.7);
      background: rgba(28, 43, 71, 0.94);
      color: #edf6ff;
    }

    .tab-chip-label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.89rem;
    }

    .tab-close {
      width: 19px;
      height: 19px;
      border-radius: 999px;
      border: 0;
      background: rgba(255, 255, 255, 0.08);
      color: #dce5f8;
      cursor: pointer;
      font-size: 0.82rem;
      line-height: 1;
      padding: 0;
    }

    .tab-close:hover {
      background: rgba(255, 127, 127, 0.24);
    }

    .viewer {
      min-height: 0;
      background: #080d18;
    }

    #blank-host {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #080d18;
    }

    .settings-panel {
      position: absolute;
      right: 16px;
      top: 66px;
      width: min(365px, calc(100% - 32px));
      max-height: calc(100% - 84px);
      overflow: auto;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--panel-strong);
      box-shadow: 0 24px 56px rgba(0, 0, 0, 0.44);
      padding: 14px;
      z-index: 4;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-6px) scale(0.98);
      transition: opacity 120ms ease, transform 120ms ease;
    }

    .settings-panel.open {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .settings-panel h2 {
      margin: 2px 0 14px;
      font-size: 1.02rem;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    .field label {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .field input {
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(10, 15, 26, 0.96);
      padding: 9px 11px;
      outline: none;
      width: 100%;
    }

    .field input:focus {
      border-color: rgba(87, 185, 255, 0.74);
    }

    .settings-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 4px;
    }

    .tiny {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.4;
    }

    .kbd {
      border: 1px solid var(--line);
      border-bottom-width: 2px;
      border-radius: 6px;
      display: inline-block;
      min-width: 20px;
      text-align: center;
      font-size: 0.74rem;
      padding: 1px 6px;
      background: rgba(255, 255, 255, 0.06);
      color: #d8e1f2;
    }

    @media (max-width: 1024px) {
      body {
        padding: 0;
      }

      .app-shell {
        width: 100%;
        min-height: 100vh;
        border: 0;
        border-radius: 0;
      }
    }

    @media (max-width: 900px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .brand {
        width: fit-content;
      }

      .url-row {
        grid-template-columns: minmax(0, 1fr) auto auto auto auto;
      }

      .hide-mobile {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="toolbar">
      <div class="brand">Portal Hub</div>
      <div class="url-row">
        <input id="url-input" type="text" autocomplete="off" spellcheck="false" placeholder="Enter URL (example.com)" />
        <button id="go-btn" class="btn btn-primary">Go</button>
        <button id="new-tab-btn" class="btn">New</button>
        <button id="home-btn" class="btn">Home</button>
        <button id="ai-btn" class="btn">AI Helper</button>
        <button id="popout-btn" class="btn hide-mobile">Pop Out</button>
      </div>
      <div class="right-tools">
        <span id="railway-status" class="status" data-state="online">Proxy mode</span>
        <button id="panic-btn" class="btn btn-danger">Panic</button>
        <button id="settings-btn" class="btn">Settings</button>
      </div>
    </header>

    <div id="tab-strip" class="tab-strip" aria-label="Open tabs"></div>

    <main class="viewer">
      <iframe id="blank-host" src="about:blank" title="about blank browser host"></iframe>
    </main>

    <aside id="settings-panel" class="settings-panel" aria-hidden="true">
      <h2>Settings</h2>
      <div class="field">
        <label for="cloak-title">Cloak title</label>
        <input id="cloak-title" type="text" placeholder="Google Docs" />
      </div>
      <div class="field">
        <label for="cloak-favicon">Cloak favicon URL</label>
        <input id="cloak-favicon" type="url" placeholder="https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png" />
      </div>
      <div class="field">
        <label for="panic-url">Panic redirect URL</label>
        <input id="panic-url" type="text" placeholder="https://classroom.google.com/" />
      </div>

      <p class="tiny">Hotkeys: <span class="kbd">Esc</span> or <span class="kbd">`</span> triggers panic redirect.</p>
      <p class="tiny">Built-in proxy mode: many blocked sites can load in-frame, but some advanced apps may still fail.</p>

      <div class="settings-actions">
        <button id="close-settings-btn" class="btn">Close</button>
        <button id="save-settings-btn" class="btn btn-primary">Save</button>
      </div>
    </aside>
  </div>

  <script>
    (() => {
      const STORAGE_KEY = "browser_hub_settings_v1";
      const DEFAULT_SETTINGS = {
        cloakTitle: "Study Portal",
        cloakFavicon: "https://ssl.gstatic.com/docs/doclist/images/drive_2022q3_32dp.png",
        panicUrl: "https://classroom.google.com/"
      };

      const QUICK_LINKS = [
        { label: "YouTube", icon: "YT", url: "https://www.youtube.com/" },
        { label: "TV", icon: "TV", url: "https://pluto.tv/us/live-tv" },
        { label: "Classroom", icon: "CL", url: "https://classroom.google.com/" },
        { label: "Games", icon: "GM", url: "https://www.crazygames.com/" },
        { label: "Docs", icon: "DC", url: "https://docs.google.com/" },
        { label: "Drive", icon: "DR", url: "https://drive.google.com/" },
        { label: "Chess", icon: "CH", url: "https://www.chess.com/" }
      ];

      const dom = {
        urlInput: document.getElementById("url-input"),
        goBtn: document.getElementById("go-btn"),
        newTabBtn: document.getElementById("new-tab-btn"),
        homeBtn: document.getElementById("home-btn"),
        aiBtn: document.getElementById("ai-btn"),
        popoutBtn: document.getElementById("popout-btn"),
        panicBtn: document.getElementById("panic-btn"),
        settingsBtn: document.getElementById("settings-btn"),
        tabStrip: document.getElementById("tab-strip"),
        blankHost: document.getElementById("blank-host"),
        settingsPanel: document.getElementById("settings-panel"),
        cloakTitle: document.getElementById("cloak-title"),
        cloakFavicon: document.getElementById("cloak-favicon"),
        panicUrl: document.getElementById("panic-url"),
        closeSettingsBtn: document.getElementById("close-settings-btn"),
        saveSettingsBtn: document.getElementById("save-settings-btn"),
        railwayStatus: document.getElementById("railway-status")
      };

      let settings = loadSettings();
      let tabs = [];
      let activeTabId = "";
      let tabSeed = 0;
      let contentFrame = null;
      const PROXY_PREFIX = "/proxy?url=";

      function loadSettings() {
        try {
          const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
          return {
            cloakTitle: parsed.cloakTitle || DEFAULT_SETTINGS.cloakTitle,
            cloakFavicon: parsed.cloakFavicon || DEFAULT_SETTINGS.cloakFavicon,
            panicUrl: parsed.panicUrl || DEFAULT_SETTINGS.panicUrl
          };
        } catch (_error) {
          return { ...DEFAULT_SETTINGS };
        }
      }

      function persistSettings() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
      }

      function escapeHtml(input) {
        return String(input)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function normalizeUserUrl(input) {
        const raw = String(input || "").trim();
        if (!raw) {
          return "";

        }

        if (/^about:blank$/i.test(raw)) {
          return "about:blank";
        }

        const withProtocol = /^[a-zA-Z][a-zA-Z\d+.-]*:\/\//.test(raw) ? raw : `https://${raw}`;

        try {
          const parsed = new URL(withProtocol);
          if (!/^https?:$/i.test(parsed.protocol)) {
            return "";
          }
          return parsed.toString();
        } catch (_error) {
          return "";
        }
      }

      function labelFromUrl(url) {
        if (!url || url === "about:blank") {
          return "Home";
        }

        try {
          return new URL(url).hostname.replace(/^www\./i, "") || "Tab";
        } catch (_error) {
          return "Tab";
        }
      }

      function isYouTubeUrl(url) {
        try {
          const parsed = new URL(url);
          const host = parsed.hostname.toLowerCase();
          return host === "youtu.be" || host === "youtube.com" || host === "www.youtube.com" || host === "m.youtube.com";
        } catch (_error) {
          return false;
        }
      }

      function getYouTubeEmbedUrl(url) {
        try {
          const parsed = new URL(url);
          let videoId = "";

          if (parsed.hostname.toLowerCase() === "youtu.be") {
            videoId = parsed.pathname.split("/").filter(Boolean)[0] || "";
          } else if (parsed.pathname === "/watch") {
            videoId = parsed.searchParams.get("v") || "";
          } else if (parsed.pathname.startsWith("/shorts/")) {
            videoId = parsed.pathname.split("/")[2] || "";
          } else if (parsed.pathname.startsWith("/embed/")) {
            videoId = parsed.pathname.split("/")[2] || "";
          }

          if (!videoId) {
            return "";
          }

          const cleanId = videoId.replace(/[^a-zA-Z0-9_-]/g, "");
          return `https://www.youtube-nocookie.com/embed/${cleanId}`;
        } catch (_error) {
          return "";
        }
      }

      function toProxyFrameUrl(url) {
        return new URL(`${PROXY_PREFIX}${encodeURIComponent(url)}`, window.location.href).toString();
      }

      function toFrameUrl(url) {
        if (/^about:blank$/i.test(url)) {
          return "about:blank";
        }

        if (!isYouTubeUrl(url)) {
          return toProxyFrameUrl(url);
        }

        const embedUrl = getYouTubeEmbedUrl(url);
        if (!embedUrl) {
          return toProxyFrameUrl(url);
        }

        return embedUrl;
      }

      function setRailwayStatus(state, text) {
        dom.railwayStatus.dataset.state = state;
        dom.railwayStatus.textContent = text;

      }

      function applyTabCloak() {
        document.title = settings.cloakTitle || DEFAULT_SETTINGS.cloakTitle;

        const iconHref = settings.cloakFavicon || DEFAULT_SETTINGS.cloakFavicon;
        let icon = document.querySelector("link[rel='icon']");
        if (!icon) {
          icon = document.createElement("link");
          icon.rel = "icon";
          document.head.appendChild(icon);
        }
        icon.href = iconHref;
      }

      function findTab(tabId) {
        return tabs.find((tab) => tab.id === tabId) || null;
      }

      function closeTab(tabId) {
        const index = tabs.findIndex((tab) => tab.id === tabId);
        if (index < 0) {
          return;
        }

        const closedWasActive = tabs[index].id === activeTabId;
        tabs.splice(index, 1);

        if (!tabs.length) {
          createHomeTab();
          return;
        }

        if (closedWasActive) {
          const fallback = tabs[index] || tabs[index - 1] || tabs[0];
          activateTab(fallback.id);
        } else {
          renderTabStrip();
        }
      }

      function getActiveTab() {
        return findTab(activeTabId);
      }

      function createTab({ url = "", title = "Home", home = false, helper = false, external = false, activate = true } = {}) {
        const tab = {
          id: `tab-${++tabSeed}`,
          url,
          title,
          home,
          helper,
          external
        };

        tabs.push(tab);

        if (activate) {
          activateTab(tab.id);
        } else {
          renderTabStrip();
        }

        return tab;
      }

      function renderTabStrip() {
        dom.tabStrip.innerHTML = "";

        tabs.forEach((tab) => {
          const tabEl = document.createElement("div");
          tabEl.className = `tab-chip${tab.id === activeTabId ? " active" : ""}`;
          tabEl.dataset.tabId = tab.id;

          const label = document.createElement("span");
          label.className = "tab-chip-label";
          label.textContent = tab.title;

          const close = document.createElement("button");
          close.type = "button";
          close.className = "tab-close";
          close.textContent = "x";

          close.addEventListener("click", (event) => {
            event.stopPropagation();
            closeTab(tab.id);
          });

          tabEl.addEventListener("click", () => activateTab(tab.id));
          tabEl.append(label, close);
          dom.tabStrip.appendChild(tabEl);
        });

        const addButton = document.createElement("button");
        addButton.type = "button";
        addButton.className = "btn";
        addButton.textContent = "+";
        addButton.addEventListener("click", () => createHomeTab());
        dom.tabStrip.appendChild(addButton);
      }

      function buildHomeMarkup() {
        const cards = QUICK_LINKS.map((item) => {
          const label = escapeHtml(item.label);
          const icon = escapeHtml(item.icon);
          const url = escapeHtml(item.url);

          return `
            <button class="quick-card" data-url="${url}">
              <span class="quick-icon">${icon}</span>
              <span class="quick-name">${label}</span>
            </button>
          `;
        }).join("");

        return `
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <style>
              * { box-sizing: border-box; }
              body {
                margin: 0;
                min-height: 100vh;
                font-family: "Space Grotesk", system-ui, sans-serif;
                color: #e8eef8;
                display: grid;
                place-items: center;
                background:
                  radial-gradient(900px 420px at 10% -8%, #1b3058 0%, transparent 60%),
                  radial-gradient(900px 460px at 98% 0%, #0d2a4e 0%, transparent 60%),
                  linear-gradient(180deg, #060a12 0%, #090f1c 100%);
              }
              .home {
                width: min(960px, calc(100% - 32px));
                display: grid;
                gap: 20px;
                animation: fadeIn 280ms ease;
              }
              h1 {
                margin: 0;
                font-size: clamp(1.25rem, 1.8vw + 1rem, 1.95rem);
              }
              p {
                margin: 0;
                color: #95a4c0;
              }
              .quick-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 12px;
              }
              .quick-card {
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 14px;
                background: rgba(12, 18, 30, 0.9);
                color: inherit;
                cursor: pointer;
                text-align: left;
                display: grid;
                gap: 10px;
                padding: 14px;
                min-height: 92px;
                transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
              }
              .quick-card:hover {
                transform: translateY(-2px);
                border-color: rgba(87, 185, 255, 0.68);
                background: rgba(22, 34, 57, 0.95);
              }
              .quick-icon {
                width: 34px;
                height: 34px;
                border-radius: 10px;
                border: 1px solid rgba(87, 185, 255, 0.48);
                background: rgba(87, 185, 255, 0.18);
                color: #c6e6ff;
                display: inline-grid;
                place-items: center;
                font-size: 0.78rem;
                font-weight: 700;
              }
              .quick-name {
                font-size: 0.92rem;
                font-weight: 600;
                letter-spacing: 0.02em;
              }
              @keyframes fadeIn {
                from { opacity: 0; transform: translateY(4px); }
                to { opacity: 1; transform: translateY(0); }
              }
            </style>
          </head>
          <body>
            <section class="home">
              <div>
                <h1>Quick Launch</h1>
                <p>Select a site below or type one in the URL bar.</p>
              </div>
              <div class="quick-grid">${cards}</div>
            </section>

            <script>
              document.querySelectorAll(".quick-card").forEach((card) => {
                card.addEventListener("click", () => {
                  const url = card.getAttribute("data-url");
                  if (url) {
                    top.postMessage({ type: "hub-open-url", url }, "*");
                  }
                });
              });
            <\/script>
          </body>
          </html>
        `;
      }

      function buildHelperMarkup() {
        return `
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <style>
              * { box-sizing: border-box; }
              body {
                margin: 0;
                min-height: 100vh;
                font-family: "Space Grotesk", system-ui, sans-serif;
                color: #e8eef8;
                background:
                  radial-gradient(900px 420px at 10% -8%, #1b3058 0%, transparent 60%),
                  radial-gradient(900px 460px at 98% 0%, #0d2a4e 0%, transparent 60%),
                  linear-gradient(180deg, #060a12 0%, #090f1c 100%);
                padding: 18px;
              }
              .helper {
                width: min(1080px, 100%);
                margin: 0 auto;
                display: grid;
                gap: 14px;
              }
              .helper h1 {
                margin: 0;
                font-size: clamp(1.1rem, 1.2vw + 0.9rem, 1.55rem);

              .muted { color: #94a5c1; margin: 0; }
              .helper-grid {
                display: grid;
                grid-template-columns: 1.2fr 0.9fr;
                gap: 12px;
              }
              .panel {
                border: 1px solid rgba(255, 255, 255, 0.1);

                background: rgba(12, 18, 30, 0.9);

              .chat-log {

              textarea:focus {

              button {
                border: 1px solid rgba(255, 255, 255, 0.14);

              button.primary {
                border-color: rgba(87, 185, 255, 0.56);

              }
              .chips {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
              }
              .chip {
                font-size: 0.8rem;
                padding: 6px 8px;
                border-radius: 999px;
                background: rgba(255, 255, 255, 0.06);
              }
              .bug-box {
                border: 1px solid rgba(255, 255, 255, 0.08);
                border-radius: 10px;
                background: rgba(8, 13, 22, 0.85);
                padding: 10px;
                display: grid;
                gap: 8px;
              }
              .bug-box h3 {
                margin: 0;
                font-size: 0.9rem;
              }
              .bug-log {
                list-style: none;
                margin: 0;
                padding: 0;
                display: grid;
                gap: 6px;
                max-height: 160px;
                overflow: auto;
              }
              .bug-log li {
                display: flex;
                justify-content: space-between;
                gap: 10px;
                border: 1px solid rgba(255, 255, 255, 0.08);
                border-radius: 10px;
                padding: 7px 9px;
                background: rgba(10, 16, 28, 0.9);
                font-size: 0.84rem;
              }
              .file-input {
                border: 1px dashed rgba(255, 255, 255, 0.22);
                border-radius: 10px;
                padding: 10px;
                background: rgba(6, 10, 18, 0.85);
              }
              .preview {
                width: 100%;
                max-height: 210px;
                object-fit: contain;
                border-radius: 10px;
                border: 1px solid rgba(255, 255, 255, 0.1);
                background: rgba(4, 6, 12, 0.95);
              }
              .hidden { display: none; }
              .stats {
                list-style: none;
                margin: 0;
                padding: 0;
                display: grid;
                gap: 8px;
              }
              .stats li {
                display: flex;
                justify-content: space-between;
                gap: 10px;
                border: 1px solid rgba(255, 255, 255, 0.08);
                border-radius: 10px;
                padding: 8px 10px;
                background: rgba(8, 13, 22, 0.9);
              }
              @media (max-width: 880px) {
                body { padding: 10px; }
                .helper-grid { grid-template-columns: 1fr; }
                .panel { min-height: unset; }
              }
            </style>
          </head>
          <body>
            <section class="helper">
              <div>
                <h1>AI Helper</h1>
                <p class="muted">Built-in assistant for walkthroughs, troubleshooting, and image checks.</p>
              </div>

              <div class="helper-grid">
                <section class="panel">
                  <h2>How-to Assistant</h2>
                  <div id="chat-log" class="chat-log"></div>

                  <div class="composer">
                    <textarea id="helper-input" placeholder="Ask anything: setup tabs, cloak options, why iframe is blocked, how to use panic key..."></textarea>
                    <div class="actions">
                      <button id="ask-btn" class="primary" type="button">Ask Helper</button>
                      <button id="clear-btn" type="button">Clear</button>
                    </div>
                  </div>

                  <div class="chips">
                    <button class="chip" type="button" data-prompt="How do I make YouTube work in this hub?">YouTube tips</button>
                    <button class="chip" type="button" data-prompt="How do I use tab cloaking safely?">Cloaking</button>
                    <button class="chip" type="button" data-prompt="Why does a site show blank in iframe?">Iframe blocked?</button>
                    <button class="chip" type="button" data-prompt="Show me a fast workflow for tabs and panic key.">Fast workflow</button>
                  </div>

                  <div class="bug-box">
                    <h3>Bug Fix AI</h3>
                    <p class="muted">Runs local diagnostics and can safely reload the hub if core parts break.</p>
                    <div class="actions">
                      <button id="diag-btn" type="button">Run Diagnostics</button>
                      <button id="autofix-btn" class="primary" type="button">Auto Fix</button>
                    </div>
                    <ul id="bug-log" class="bug-log"></ul>
                  </div>
                </section>

                <section class="panel">
                  <h2>Image Checker</h2>
                  <p class="muted">Upload a screenshot/photo to inspect dimensions, orientation, brightness, and color.</p>
                  <input id="image-input" class="file-input" type="file" accept="image/*" />
                  <img id="image-preview" class="preview hidden" alt="Selected preview" />

                  <ul class="stats">
                    <li><span>Resolution</span><strong id="stat-resolution">-</strong></li>
                    <li><span>Orientation</span><strong id="stat-orientation">-</strong></li>
                    <li><span>Aspect ratio</span><strong id="stat-ratio">-</strong></li>
                    <li><span>Average color</span><strong id="stat-color">-</strong></li>
                    <li><span>Brightness</span><strong id="stat-brightness">-</strong></li>
                    <li><span>Contrast</span><strong id="stat-contrast">-</strong></li>
                  </ul>

                  <p id="image-summary" class="muted">No image uploaded yet.</p>
                </section>
              </div>
            </section>

            <script>
              (() => {
                const log = document.getElementById("chat-log");
                const input = document.getElementById("helper-input");
                const askBtn = document.getElementById("ask-btn");
                const clearBtn = document.getElementById("clear-btn");

                const imageInput = document.getElementById("image-input");
                const imagePreview = document.getElementById("image-preview");
                const statResolution = document.getElementById("stat-resolution");
                const statOrientation = document.getElementById("stat-orientation");
                const statRatio = document.getElementById("stat-ratio");
                const statColor = document.getElementById("stat-color");
                const statBrightness = document.getElementById("stat-brightness");
                const statContrast = document.getElementById("stat-contrast");
                const imageSummary = document.getElementById("image-summary");
                const diagBtn = document.getElementById("diag-btn");
                const autoFixBtn = document.getElementById("autofix-btn");
                const bugLog = document.getElementById("bug-log");

                function addMessage(role, text) {
                  const item = document.createElement("div");
                  item.className = "message " + role;
                  item.textContent = text;
                  log.appendChild(item);
                  log.scrollTop = log.scrollHeight;
                }

                function makeResponse(prompt) {
                  const text = prompt.toLowerCase();
                  const tips = [];

                  if (text.includes("youtube") || text.includes("video")) {
                    tips.push("Paste a direct YouTube video URL like youtube.com/watch?v=... or youtu.be/... for best in-frame playback.");
                  }
                  if (text.includes("iframe") || text.includes("blocked") || text.includes("blank")) {
                    tips.push("This hub uses a built-in proxy to improve compatibility, but some sites still break due to heavy anti-bot scripts or unsupported browser APIs.");
                  }
                  if (text.includes("bug") || text.includes("error") || text.includes("broken") || text.includes("not work")) {
                    tips.push("Use Bug Fix AI below: run Diagnostics first, then Auto Fix for safe recovery if core parts are missing.");
                  }
                  if (text.includes("panic") || text.includes("escape") || text.includes("hotkey")) {
                    tips.push("Set your Panic Redirect URL in Settings. Then press Esc or backtick to instantly leave the current page.");
                  }
                  if (text.includes("cloak") || text.includes("title") || text.includes("favicon")) {
                    tips.push("Use Settings to change cloak title and favicon. Save to apply immediately and persist in local storage.");
                  }
                  if (text.includes("tab") || text.includes("workflow")) {
                    tips.push("Fast workflow: New tab for secondary page, Home for quick links, AI Helper for troubleshooting, Panic key for instant exit.");
                  }
                  if (text.includes("image") || text.includes("screenshot") || text.includes("photo")) {
                    tips.push("Use Image Checker: upload file to inspect resolution, orientation, color profile, brightness, and contrast.");
                  }

                  if (!tips.length) {
                    tips.push("I can help with tab workflow, about:blank behavior, panic key setup, cloaking setup, iframe issues, and image checks.");
                    tips.push("Try prompts like: 'Why is this site blank?' or 'How do I configure panic key?' or 'How do I inspect this screenshot?'");
                  }

                  return tips.map((item, index) => (index + 1) + ". " + item).join("\n");
                }

                function askHelper() {
                  const prompt = input.value.trim();
                  if (!prompt) {
                    return;
                  }

                  addMessage("user", prompt);
                  addMessage("assistant", makeResponse(prompt));
                  input.value = "";
                  input.focus();
                }

                function getHubWindow() {
                  try {
                    if (top && top.document && top.document.getElementById("blank-host")) {
                      return top;
                    }
                  } catch (_error) {
                  }

                  try {
                    if (window.opener && window.opener.document && window.opener.document.getElementById("blank-host")) {
                      return window.opener;
                    }
                  } catch (_error) {
                  }

                  return null;
                }

                function addBugEntry(label, value) {
                  if (!bugLog) {
                    return;
                  }

                  const item = document.createElement("li");
                  const left = document.createElement("span");
                  const right = document.createElement("strong");
                  left.textContent = label;
                  right.textContent = value;
                  item.append(left, right);
                  bugLog.appendChild(item);
                }

                function runDiagnostics() {
                  if (!bugLog) {
                    return [];
                  }

                  bugLog.innerHTML = "";
                  const hubWindow = getHubWindow();
                  if (!hubWindow) {
                    addBugEntry("Hub access", "Unavailable");
                    addBugEntry("Tip", "Open helper inside main hub tab");
                    return [];
                  }

                  const hubDoc = hubWindow.document;
                  const statusEl = hubDoc.getElementById("railway-status");
                  const blankHost = hubDoc.getElementById("blank-host");
                  const siteFrame = blankHost && blankHost.contentDocument ? blankHost.contentDocument.getElementById("site-frame") : null;
                  const aiButton = hubDoc.getElementById("ai-btn");

                  const rows = [
                    ["Mode", statusEl ? (statusEl.textContent.trim() || "Unknown") : "Missing"],
                    ["Outer frame", blankHost ? "OK" : "Missing"],
                    ["Inner frame", siteFrame ? "OK" : "Missing"],
                    ["AI button", aiButton ? "OK" : "Missing"]
                  ];

                  rows.forEach(([label, value]) => addBugEntry(label, value));
                  return rows;
                }

                function runAutoFix() {
                  const rows = runDiagnostics();
                  const missingFound = rows.some(([, value]) => /missing/i.test(String(value)));

                  if (!rows.length) {
                    addMessage("assistant", "Bug Fix AI: I could not access the main hub context from this tab.");
                    return;
                  }

                  if (!missingFound) {
                    addMessage("assistant", "Bug Fix AI: No critical missing parts found. If a website still fails, it is likely blocked by anti-bot or login security.");
                    return;
                  }

                  const hubWindow = getHubWindow();
                  if (!hubWindow) {
                    addMessage("assistant", "Bug Fix AI: Could not reach the main hub window for auto-fix.");
                    return;
                  }

                  addMessage("assistant", "Bug Fix AI: I found missing core pieces. Applying safe recovery by reloading the hub now...");
                  setTimeout(() => {
                    hubWindow.location.reload();
                  }, 250);
                }

                askBtn.addEventListener("click", askHelper);
                clearBtn.addEventListener("click", () => {
                  log.innerHTML = "";
                  addMessage("assistant", "Chat cleared. Ask me anything about using this hub or checking images.");
                });

                input.addEventListener("keydown", (event) => {
                  if (event.key === "Enter" && !event.shiftKey) {
                    event.preventDefault();
                    askHelper();
                  }
                });

                document.querySelectorAll(".chip").forEach((chip) => {
                  chip.addEventListener("click", () => {
                    const prompt = chip.getAttribute("data-prompt") || "";
                    input.value = prompt;
                    askHelper();
                  });
                });

                if (diagBtn) {
                  diagBtn.addEventListener("click", runDiagnostics);
                }

                if (autoFixBtn) {
                  autoFixBtn.addEventListener("click", runAutoFix);
                }

                function analyzeImage(img) {
                  const width = img.naturalWidth || img.width;
                  const height = img.naturalHeight || img.height;
                  statResolution.textContent = width + " x " + height;

                  if (width > height) {
                    statOrientation.textContent = "Landscape";
                  } else if (height > width) {
                    statOrientation.textContent = "Portrait";
                  } else {
                    statOrientation.textContent = "Square";
                  }

                  statRatio.textContent = (width / Math.max(height, 1)).toFixed(2);

                  const sampleCanvas = document.createElement("canvas");
                  const max = 160;
                  const scale = Math.min(1, max / Math.max(width, 1), max / Math.max(height, 1));
                  sampleCanvas.width = Math.max(1, Math.floor(width * scale));
                  sampleCanvas.height = Math.max(1, Math.floor(height * scale));

                  const ctx = sampleCanvas.getContext("2d", { willReadFrequently: true });
                  if (!ctx) {
                    statColor.textContent = "Unavailable";
                    statBrightness.textContent = "Unavailable";
                    statContrast.textContent = "Unavailable";
                    imageSummary.textContent = "Could not analyze pixel data in this browser.";
                    return;
                  }

                  ctx.drawImage(img, 0, 0, sampleCanvas.width, sampleCanvas.height);
                  const pixels = ctx.getImageData(0, 0, sampleCanvas.width, sampleCanvas.height).data;

                  let r = 0;
                  let g = 0;
                  let b = 0;
                  let luminanceSum = 0;
                  let luminanceSq = 0;
                  let count = 0;

                  for (let i = 0; i < pixels.length; i += 4) {
                    const pr = pixels[i];
                    const pg = pixels[i + 1];
                    const pb = pixels[i + 2];
                    r += pr;
                    g += pg;
                    b += pb;

                    const lum = (0.2126 * pr) + (0.7152 * pg) + (0.0722 * pb);
                    luminanceSum += lum;
                    luminanceSq += lum * lum;
                    count += 1;
                  }

                  const avgR = Math.round(r / Math.max(count, 1));
                  const avgG = Math.round(g / Math.max(count, 1));
                  const avgB = Math.round(b / Math.max(count, 1));
                  statColor.textContent = "rgb(" + avgR + ", " + avgG + ", " + avgB + ")";

                  const brightness = Math.round((avgR + avgG + avgB) / 3);
                  if (brightness < 85) {
                    statBrightness.textContent = "Dark";
                  } else if (brightness > 170) {
                    statBrightness.textContent = "Bright";
                  } else {
                    statBrightness.textContent = "Balanced";
                  }

                  const avgLum = luminanceSum / Math.max(count, 1);
                  const variance = (luminanceSq / Math.max(count, 1)) - (avgLum * avgLum);
                  if (variance > 2000) {
                    statContrast.textContent = "High";
                  } else if (variance > 800) {
                    statContrast.textContent = "Medium";
                  } else {
                    statContrast.textContent = "Low";
                  }

                  imageSummary.textContent = "Image looks " + statBrightness.textContent.toLowerCase() + " with " + statContrast.textContent.toLowerCase() + " contrast.";
                }

                imageInput.addEventListener("change", () => {
                  const file = imageInput.files && imageInput.files[0];
                  if (!file) {
                    return;
                  }

                  const reader = new FileReader();
                  reader.onload = () => {
                    const dataUrl = String(reader.result || "");
                    imagePreview.src = dataUrl;
                    imagePreview.classList.remove("hidden");

                    const img = new Image();
                    img.onload = () => analyzeImage(img);
                    img.src = dataUrl;
                  };
                  reader.readAsDataURL(file);
                });

                addMessage("assistant", "I am your built-in helper. Ask me how to use this hub, upload an image, or run Bug Fix AI diagnostics.");
              })();
            <\/script>
          </body>
          </html>
        `;
      }

      function renderHome() {
        if (!contentFrame) {
          return;
        }

        contentFrame.removeAttribute("src");
        contentFrame.srcdoc = buildHomeMarkup();
      }

      function renderHelper() {
        if (!contentFrame) {
          return;
        }

        contentFrame.removeAttribute("src");
        contentFrame.srcdoc = buildHelperMarkup();
      }

      function renderExternalNotice(url) {
        if (!contentFrame) {
          return;
        }

        const safeUrl = escapeHtml(url);
        contentFrame.removeAttribute("src");
        contentFrame.srcdoc = `
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <style>
              * { box-sizing: border-box; }
              body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                font-family: "Space Grotesk", system-ui, sans-serif;
                color: #e8eef8;
                background:
                  radial-gradient(900px 420px at 10% -8%, #1b3058 0%, transparent 60%),
                  radial-gradient(900px 460px at 98% 0%, #0d2a4e 0%, transparent 60%),
                  linear-gradient(180deg, #060a12 0%, #090f1c 100%);
                padding: 24px;
              }
              .card {
                width: min(680px, 100%);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 16px;
                background: rgba(12, 18, 30, 0.9);
                padding: 18px;
                display: grid;
                gap: 12px;
              }
              .muted { color: #95a4c0; }
              a {
                color: #c6e6ff;
                text-decoration: none;
                border: 1px solid rgba(87, 185, 255, 0.55);
                background: rgba(87, 185, 255, 0.2);
                border-radius: 10px;
                padding: 8px 10px;
                width: fit-content;
              }
            </style>
          </head>
          <body>
            <section class="card">
              <strong>Opened in a separate tab</strong>
              <span class="muted">This site blocks iframe embedding. Use the new browser tab to interact with it.</span>
              <a href="${safeUrl}" target="_blank" rel="noopener noreferrer">Open again</a>
            </section>
          </body>
          </html>
        `;
      }

      function renderSite(url) {
        if (!contentFrame) {
          return;
        }

        contentFrame.removeAttribute("srcdoc");
        contentFrame.src = toFrameUrl(url);
      }

      function activateTab(tabId) {
        const tab = findTab(tabId);
        if (!tab) {
          return;
        }

        activeTabId = tab.id;
        renderTabStrip();

        if (tab.home) {
          dom.urlInput.value = "";
          renderHome();
          return;
        }

        if (tab.helper) {
          dom.urlInput.value = "";
          renderHelper();
          return;
        }

        if (tab.external) {
          dom.urlInput.value = tab.url;
          renderExternalNotice(tab.url);
          return;
        }

        dom.urlInput.value = tab.url;
        renderSite(tab.url);
      }

      function createHomeTab() {
        createTab({ home: true, title: "Home", activate: true });
      }

      function createHelperTab() {
        const existing = tabs.find((tab) => tab.helper);
        if (existing) {
          activateTab(existing.id);
          return;
        }

        createTab({
          title: "AI Helper",
          home: false,
          helper: true,
          external: false,
          activate: true
        });
      }

      function navigate(rawUrl, newTab) {
        const normalized = normalizeUserUrl(rawUrl);
        if (!normalized) {
          dom.urlInput.focus();
          return;
        }

        if (newTab) {
          createTab({
            home: false,
            url: normalized,
            title: labelFromUrl(normalized),
            helper: false,
            external: false,
            activate: true
          });
          return;
        }

        const activeTab = getActiveTab();
        if (!activeTab) {
          createTab({
            home: false,
            url: normalized,
            title: labelFromUrl(normalized),
            helper: false,
            external: false,
            activate: true
          });
          return;
        }

        activeTab.home = false;
        activeTab.helper = false;
        activeTab.external = false;
        activeTab.url = normalized;
        activeTab.title = labelFromUrl(normalized);

        activateTab(activeTab.id);
      }

      function panicRedirect() {
        const target = normalizeUserUrl(settings.panicUrl) || DEFAULT_SETTINGS.panicUrl;
        window.location.replace(target);
      }

      function openSettings() {
        dom.cloakTitle.value = settings.cloakTitle;
        dom.cloakFavicon.value = settings.cloakFavicon;
        dom.panicUrl.value = settings.panicUrl;
        dom.settingsPanel.classList.add("open");
        dom.settingsPanel.setAttribute("aria-hidden", "false");
      }

      function closeSettings() {
        dom.settingsPanel.classList.remove("open");
        dom.settingsPanel.setAttribute("aria-hidden", "true");
      }

      function saveSettingsFromPanel() {
        settings = {
          cloakTitle: dom.cloakTitle.value.trim() || DEFAULT_SETTINGS.cloakTitle,
          cloakFavicon: dom.cloakFavicon.value.trim() || DEFAULT_SETTINGS.cloakFavicon,
          panicUrl: dom.panicUrl.value.trim() || DEFAULT_SETTINGS.panicUrl
        };

        persistSettings();
        applyTabCloak();
        setDirectModeStatus();
        closeSettings();

        const activeTab = getActiveTab();
        if (activeTab) {
          activateTab(activeTab.id);
        }
      }

      function openPopout() {
        const popup = window.open("about:blank", "_blank", "noopener,noreferrer");
        if (!popup) {
          return;
        }

        const activeTab = getActiveTab();
        if (activeTab && activeTab.helper) {
          popup.document.open();
          popup.document.write(buildHelperMarkup());
          popup.document.close();
          return;
        }

        if (activeTab && activeTab.external) {
          popup.location.replace(activeTab.url);
          return;
        }

        const target = activeTab && !activeTab.home ? toFrameUrl(activeTab.url) : "about:blank";
        const popupTitle = escapeHtml(settings.cloakTitle || DEFAULT_SETTINGS.cloakTitle);
        const popupIcon = escapeHtml(settings.cloakFavicon || DEFAULT_SETTINGS.cloakFavicon);
        const popupSrc = escapeHtml(target);

        popup.document.open();
        popup.document.write(`
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>${popupTitle}</title>
            <link rel="icon" href="${popupIcon}" />
            <style>
              html, body { margin: 0; width: 100%; height: 100%; background: #000; }
              iframe { border: 0; width: 100%; height: 100%; display: block; }
            </style>
          </head>
          <body>
            <iframe src="${popupSrc}" referrerpolicy="no-referrer"></iframe>
          </body>
          </html>
        `);
        popup.document.close();
      }

      function setDirectModeStatus() {
        setRailwayStatus("online", "Built-in proxy mode");
      }

      async function initializeBlankHost() {
        await new Promise((resolve) => {
          const onLoad = () => resolve();
          dom.blankHost.src = "about:blank";

          if (dom.blankHost.contentDocument && dom.blankHost.contentDocument.readyState === "complete") {
            resolve();
            return;
          }

          dom.blankHost.addEventListener("load", onLoad, { once: true });
        });

        const blankDoc = dom.blankHost.contentDocument;
        if (!blankDoc) {
          return;
        }

        blankDoc.open();
        blankDoc.write(`
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <style>
              html, body {
                margin: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: #050810;
              }
              #site-frame {
                border: 0;
                width: 100%;
                height: 100%;
                display: block;
                background: #050810;
              }
            </style>
          </head>
          <body>
            <iframe id="site-frame" src="about:blank" referrerpolicy="no-referrer"></iframe>
          </body>
          </html>
        `);
        blankDoc.close();

        contentFrame = blankDoc.getElementById("site-frame");
      }

      function bindEvents() {
        dom.goBtn.addEventListener("click", () => navigate(dom.urlInput.value, false));

        dom.newTabBtn.addEventListener("click", () => {
          const typedUrl = dom.urlInput.value.trim();
          if (typedUrl) {
            navigate(typedUrl, true);
          } else {
            createHomeTab();
          }
        });

        dom.urlInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            navigate(dom.urlInput.value, false);
          }
        });

        dom.homeBtn.addEventListener("click", createHomeTab);
        dom.aiBtn.addEventListener("click", createHelperTab);
        dom.popoutBtn.addEventListener("click", openPopout);
        dom.panicBtn.addEventListener("click", panicRedirect);

        dom.settingsBtn.addEventListener("click", openSettings);
        dom.closeSettingsBtn.addEventListener("click", closeSettings);
        dom.saveSettingsBtn.addEventListener("click", saveSettingsFromPanel);

        window.addEventListener("message", (event) => {
          const data = event.data;
          if (!data || typeof data !== "object") {
            return;
          }
          if (data.type !== "hub-open-url" || typeof data.url !== "string") {
            return;
          }
          navigate(data.url, false);
        });

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape" || event.key === "`") {
            panicRedirect();
          }
        });

        document.addEventListener("click", (event) => {
          const target = event.target;
          if (!(target instanceof Node)) {
            return;
          }

          if (!dom.settingsPanel.contains(target) && !dom.settingsBtn.contains(target)) {
            closeSettings();
          }
        });
      }

      async function init() {
        applyTabCloak();
        bindEvents();
        await initializeBlankHost();

        if (!tabs.length) {
          createHomeTab();
        } else if (activeTabId) {
          activateTab(activeTabId);
        }

        setDirectModeStatus();
      }

      init();
    })();
  </script>
</body>
</html>
